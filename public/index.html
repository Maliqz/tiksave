<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikSave - Download TikTok Without Watermark</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>TIKSAVE</h1>
  <p>Download TikTok Videos Without Watermark</p>
</header>

<div class="card">

  <div class="input-group">
    <input 
      type="text"
      id="url"
      placeholder="Paste TikTok video link here..."
      autocomplete="off"
    >

    <button id="downloadBtn">
      Download
    </button>
  </div>

  <div id="result"></div>

</div>

<!-- Script selalu di paling bawah -->
<script src="script.js"></script>

</body>
</html>
